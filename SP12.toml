catalog = "/courses/ECE.html#ece282"
note = """The course will begin with the fundamental principles of quantum \
  mechanics, pure and mixed states, uncertainty relations, Schrodinger \
  equation of motion, and quantum harmonic oscillator. It will then cover \
  quantization of electromagnetic field, the Hamiltonian of atom-field \
  interaction, quantum theory of spontaneous and stimulated emission, quantum \
  theory of damping, and enhancement and suppression of spontaneous emission \
  in a cavity (Purcell effect)."""

