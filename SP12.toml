[ECE.courses.287]
title = "Spec Topics/Comm Theory & Syst"
catalog = "/courses/ECE.html#ece287"
note = """Wireless communications is a rapidly growing area that empowers \
  mobile devices such as smart phones and tablet computers. With ever \
  increasing demand for higher throughput, modern wireless communication \
  systems employ increasingly larger bandwidth and larger number of antennas. \
  The underlying technologies that enables the use of large bandwidth and \
  multiple antennas are OFDM and MIMO. These OFDM and MIMO are in turn based \
  on fundamental theories such as information theory, coding theory, and \
  estimation and detection theory. Thus, in this course, we will explore how \
  fundamental theories are applied to real-world wireless communication \
  systems with focus on OFDM and MIMO."""

