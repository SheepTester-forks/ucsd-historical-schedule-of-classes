catalog = "/courses/LIT.html#ltko1c"
note = """LTKO 1C is designed to help students develop beginning- level skills \
  in the Korean language. section A01 is recommended for students who have no \
  Korean language background, and concentrates on listening and speaking \
  skills, and cultural understanding. Sections B01 and C01 are recommended for \
  students who have Korean language background with a concentration on reading \
  and writing skills."""

