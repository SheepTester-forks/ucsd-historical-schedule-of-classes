catalog = "/courses/SIO.html#sio130"
note = """This course includes theoretical and practical training to meet \
  Scripps and AAUS standards for scientific diving authorization and involves \
  classroom, field, and ocean skin and scuba diving sessions. Topics includes \
  scientific diving programs and policy, physics and physiology of diving, \
  decompression theory, dive planning, navigation, search and recovery, \
  equipment and environmental considerations, sub-tidal sampling techniques, \
  hazardous marine life, diving first aid and diver rescue. Preapproval from \
  instructor is required. Please contact Christian McDonald (cmcdonald@ucsd.\
  edu) for additional details."""

