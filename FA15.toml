[DOC.courses.1]
title = "Diversity"
catalog = "/courses/DOC.html#doc1"
note = """DOC 1 lectures (meeting type "LE" below) begin Friday, September 25. \
  DOC 1 discussion sections (meeting type "DI") will meet for the first time \
  on Thursday, October 1, or Friday, October 2. There are no "Week Zero" DOC 1 \
  sections. Adding and dropping DOC sections may be done via WebReg \
  through 4:00 p.m., Tuesday, October 6. After that, students must get DOC \
  office approval to make any changes in their DOC enrollment (email docinfo@\
  ucsd.edu and include PID). Students may not be enrolled in DOC 1 \
  concurrently with SDCC 4."""

[DOC.courses.100D]
title = "Promises&Contradictions/USCult"
catalog = "/courses/DOC.html#doc100d"
note = """DOC 100D satisfies UCSD's Diversity, Equity, and Inclusion \
  requirement. It is open to Marshall College transfer students as well as all \
  upper-division students from the other five colleges. Each lecture of this \
  course is limited to 30 students. Waitlisted students will only be allowed \
  into the class if seats become available due to dropping Week 1. Please \
  email docinfo@ucsd.edu with your PID# if you have questions. This course \
  will provide a broad overview of the histories of multiple communities and \
  explore the struggle for social justice in the United States. Topics include \
  social movements, shifting ideas about "race" and gender, the rise of \
  corporate power, and the transformation of higher education."""

