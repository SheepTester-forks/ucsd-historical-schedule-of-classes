[SDCC]
name = "San Diego Community College"

[SDCC.courses.1]
title = "English Comp-Subject A-SDCC 64"
note = """Students may drop and add SDCC 1 & SDCC 4 sections on the online \
  Schedule of Classes as enrollment limits allow. New students may add a \
  section only if they took the UC Analytical Writing Placement Exam and did \
  not pass: prerequisite checking is in place. San Diego Community College \
  District policy requires instructors to drop students who miss more than 10% \
  of class meeting time. In keeping with this policy, students who miss the \
  first two class meetings will not be allowed to add SDCC 1 or SDCC 4. \
  Students who enroll in SDCC 1 or SDCC 4 but then fail to attend the first \
  two meetings will be dropped. If you have not cleared an SDCC 1 or SDCC 4 \
  waitlist by the first day of classes, it is unlikely you will clear at all. \
  Immediately find an open section of the appropriate class, enroll, and \
  attend the first class meeting. If you are having trouble finding an open \
  section that fits your schedule, visit the Basic Writing office (Literature \
  Building 232) for help."""

[SDCC.courses.4]
title = "English as a Second Language"
note = """All students enrolled in SDCC 4 (Basic Writing) must take the Basic \
  Writing Exit Examination on Saturday, March 14 , from 10:00 a.m. to 12:30 p.\
  m. Each student enrolled in SDCC 4 will be placed in SDCC 4, SDCC 1, or a \
  college writing sequence based on the student's Exit Exam result and the \
  placement recommendation of the student's instructor. Students currently \
  enrolled in SDCC 4 should not enroll in a writing class until receiving \
  their exam results. Announcements of testing locations will be made by \
  instructors during the last week of the quarter. To be admitted to the exam, \
  each student must display a photo I.D."""

