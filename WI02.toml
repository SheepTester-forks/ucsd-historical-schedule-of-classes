[AIP]
name = "Academic Internship Program"

[AIP.courses.197]
title = "Academic Internship Program"
catalog = "/courses/AIP.html#aip197"
note = """Students must apply one quarter before they want to intern (2 \
  quarters for Washington D.C., London, and other out-of-town internships). \
  The Academic Internship Program begins accepting applications the 2nd week \
  of each quarter. Course includes orientation and wrap-up sessions. To apply, \
  students must have completed 90 units, at least 2 upper-division courses and \
  have a minimum of 2.5 UC GPA (3.0 for law firms and medical labs). \
  Applications are available in the AIP Office which is located in the \
  Literature Building, Second Floor, Room 3255. Walk-in hours are 8:00-12:00 \
  and 1:00-4:00 Mondays, Tuesdays, Thursdays, and Fridays and 8:00-1:00 \
  Wednesdays."""

