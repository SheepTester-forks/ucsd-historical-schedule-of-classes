[AIP]
name = "Academic Internship Program"

[AIP.courses.197]
title = "Academic Internship Program"
catalog = "/courses/AIP.html#aip197"
note = """Students must apply one quarter before they want to intern (2 \
  quarters for summer lab internships, Washington D.C., London, and other out-\
  of-town internships). The Academic Internship Program begins accepting \
  applications the 2nd week of each quarter. Course includes orientation and \
  wrap-up sessions. Students will choose one of the following orientation \
  sessions: Orientations for Fall 2005 Internships: Week 2: Tuesday, \
  October 4 10:00-11:00am in AIP Conf Rm Wednesday, October 5 10:00-11:00am in \
  AIP Conf Rm Wednesday, October 5 2:30-3:30pm in AIP Conf Rm Thursday, \
  October 6 2:30-3:30pm in AIP Conf Rm Students will choose one of the \
  following wrap-up sessions: Wrap-up Workshops for Fall 2005 Internships \
  Week 8: Tuesday, November 15 4:00-6:00pm in PC Gallery A Week 9: Monday, \
  November 21 4:00-6:00pm in PC Gallery A To apply, students must have \
  completed 90 units, at least 2 upper-division courses and have a minimum \
  of 2.5 UC GPA (3.0 for law firms, 2.7 for labs unless a higher GPA is \
  required by the principal investigator). Applications are available in the \
  AIP Office which is located in the Literature Building, second floor. Walk-\
  in hours are 8:00-12:00 and 1:00-4:00 Mondays, Tuesdays, Thursdays, and \
  Fridays and 8:00-1:00 on Wednesdays."""

