[LTKO.courses.1A]
title = "Beginning Korean:First Yr. I"
catalog = "/courses/LIT.html#ltko1a"
note = """LTKO 1A is designed to help students develop beginning-level skills \
  in the Korean language. Sections A01 and B01 are recommended for students \
  who have home-Korean background, and section C01 is recommended for students \
  who have no home-Korean background. The concentration is on the development \
  of basic reading, writing, listening and speaking skills, and cultural \
  understanding."""

[LTKO.courses.1B]
title = "Beginning Korean:First Yr. II"
catalog = "/courses/LIT.html#ltko1b"
note = """LTKO 1B is designed to help students develop beginning-level (second \
  quarter) skills in the Korean Language. Sections A00/01 and B00/B01 are \
  recommended for students who have home-Korean language background. Section \
  C00/01 is recommended for students who have no home-Korean language \
  background. The concentration is on the development of basic reading, \
  writing, listening, and speaking skills and cultural understanding."""

[LTKO.courses.2A]
title = "Intermediate Korean: 2nd Yr I"
catalog = "/courses/LIT.html#ltko2a"
note = """LTKO 2A is designed to help students develop intermediate-level \
  skills in the Korean language. Upon completion, students are expected to \
  have a good command of the language in various daily casual situations. \
  Sections A01 and B01 are recommended for students who have home Korean \
  background, and section C01 is recommended for students who have no home-\
  Korean language background."""

[LTKO.courses.2B]
title = "Intermediate Korean: Second Yr"
catalog = "/courses/LIT.html#ltko2b"
note = """LTKO 2B is designed to help students develop intermediate-level \
  skills in the Korean language. Upon completion, students are expected to \
  have a good command of the language in various daily conversational and \
  casual situations. Sections A01 and B01 are recommended for students who \
  have home Korean Background, and section C01 is recommended for students who \
  have no home-Korean language background."""

[LTKO.courses.3]
title = "Advanced Korean/Third Year"
catalog = "/courses/LIT.html#ltko3"
note = """LTKO 3 is designed to help students develop advanced-level skills in \
  the Korean language. Upon completion of this course, students are expected \
  to have a good command of Korean in various formal settings, which includes \
  understanding and reading daily news broadcasts/newspapers, and also writing \
  social and informal business correspondence."""

