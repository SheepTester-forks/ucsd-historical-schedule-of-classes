  industry). Applicants attend an orientation and submit an application via \
  InternLink at http://aipinternlink.ucsd.edu The AIP office is located in the \
  Literature Building, room 210. Walk-in hours are Monday, Tuesday, Thursday, \
  and Friday 8am to 12pm and 1 - 4pm and on Wednesday 8am to 1pm. Students \
  must apply one quarter before they want to intern. The Academic Internship \
  Program begins accepting applications the 2nd week of each quarter."""

