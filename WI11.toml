  Topics include: how opinions, fads, and political movements spread through \
  society: the robustness and fragility of food webs and financial markets: \
  and the technology, economics, and politics of Web information and on-line \
  communities. The course is designed at the introductory undergraduate level \
  with no formal prerequisites."""

