[AIP]
name = "Academic Internship Program"

[AIP.courses.197]
title = "Academic Internship Program"
catalog = "/courses/AIP.html#aip197"
note = """Students must apply one quarter before they want to intern (2 \
  quarters for out-of-town internships.) The Academic Internship Program \
  begins accepting applications the 2nd week of each quarter. Course includes \
  Orientation, Mid-quarter check-in and Wrap-up sessions. Students will attend \
  one of the times for each session. Orientations for Spring 2008 Internships: \
  Week 2: Tuesday, April 8th, 2008 10:00 - 11:00 a.m. Warren Large Conference \
  Room (EBU3B) Wednesday, April 9th, 2008 10:00 - 11:00 a.m. AIP Conference \
  Room 217 (Lit Bldg) Wednesday, April 9th, 2008 2:30 - 3:30 p.m. AIP \
  Conference Room 217 (Lit Bldg) Thursday, April 10th, 2008 2:30 - 3:30 p.m. \
  AIP Conference Room 217 (Lit Bldg) Mid-quarter check-in for Spring 2008 \
  Internships: Week 5: Tuesday, April 29th, 2008 10:00 - 11:00 a.m. Warren \
  Large Conference Room (EBU3B) Wednesday, April 30, 2008 10:00 - 11:00 a.m. \
  AIP Conference Room 217 (Lit Bldg) Wednesday, April 30, 2008 2:30 - 3:30 p.\
  m. AIP Conference Room 217 (Lit Bldg) Thursday, May 1st, 2008 2:30 - 3:30 p.\
  m. AIP Conference Room 217 (Lit Bldg) Wrap-Up check-in for Spring 2008 \
  Week 8 : Monday, May 19th, 2008 4:00 - 6:00 p.m. Price Center Gallery B and \
  Santa Barbara Tuesday, May 20th, 2008 4:00 - 6:00 p.m. Price Center Santa \
  Barbara and Davis/Riverside To apply, students must have completed 90 units, \
  at least 2 upper-division courses and have a minimum of 2.5 UC GPA (2.7 GPA \
  for lab internships unless higher GPA is required by the principal \
  investigator). Applications are available in the AIP office, which is \
  located in the Literature Building, second floor room 210. Walk-in hours are \
  Monday, Tuesday, Thursday, and Friday 8-12pm and 1-4pm and on \
  Wednesday 8-1pm."""

