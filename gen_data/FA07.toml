[AIP]
name = "Academic Internship Program"

[AIP.courses.197]
title = "Academic Internship Program"
catalog = "/courses/AIP.html#aip197"
note = """Students must apply one quarter before they want to intern (2 \
  quarters for out-of-town internships.) The Academic Internship Program \
  begins accepting applications the 2nd week of each quarter. Course includes \
  Orientation, Mid-quarter check-in and Wrap-up sessions. Students will attend \
  one of the times for each session. Orientations for Fall 2007 Internships: \
  Week 2: Tuesday, October 9: 10-11am AIP conference rm 217 Wednesday, \
  October 10: 10-11am AIP conference rm 217 Wednesday, October 10: 2:30-3:30pm \
  AIP conference room Thursday, October 11: 2:30-3:30pm AIP conference room \
  Mid-quarter check-in for Fall 2007 Internships: Week 5: Tuesday, \
  October 30: 10-11am PC - SF/SC room Wednesday, October 31: 10-11am PC - SF/\
  SC room Wednesday, October 31: 2:30-3:30 Warren Lg Conf EBU3 Thursday, \
  November 1: 2:30-3:30 Warren Lg Conf EBU3 Wrap-up Workshops for Fall 2007 \
  Internships Week 8: Monday, Nov 19: 4-6pm PC SB/LA & SF/SC rooms Week 9: \
  Tuesday, Nov 27: 4-6pm PC SB/LA & SF/SC rooms To apply, students must have \
  completed 90 units, at least 2 upper-division courses and have a minimum \
  of 2.5 UC GPA (2.7 GPA for lab internships unless higher GPA is required by \
  the principal investigator). Applications are available in the AIP office, \
  which is located in the Literature Building, second floor room 210. Walk-in \
  hours are Monday, Tuesday, Thursday, and Friday 8-12pm and 1-4pm and on \
  Wednesday 8-1pm."""

