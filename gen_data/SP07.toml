[AIP]
name = "Academic Internship Program"

[AIP.courses.197]
title = "Academic Internship Program"
catalog = "/courses/AIP.html#aip197"
note = """Students must apply one quarter before they want to intern (2 \
  quarters for out-of-town internships.) The Academic Internship Program \
  begins accepting applications the 2nd week of each quarter. Course includes \
  Orientation, Mid-quarter check-in and Wrap-up sessions. Students will attend \
  one of the times for each session. Orientations for Spring 2007 Internships: \
  Week 2: Tuesday, April 10: 10-11am CSE room 1202/ Wednesday, \
  April 11: 10-11am AIP conference room/ Wednesday, April 11: 2:30-3:30pm \
  Warren conferenceroom Thursday, April 12: 2:30-3:30pm CSE room 1202/ Mid-\
  quarter check-in for Spring 2007 Internships: Week 5: Tuesday, \
  May 1: 10-11am CSE room 1202 Wednesday, May 2: 10-11am AIP conference room \
  Thursday, May 3: 2:30-3:30pm CSE room 1202 Wrap-up Workshops for Spring 2007 \
  Internships Week 8: Monday, May 21: 4-6pm PC Davis/Riverside room Week 9: \
  Thursday, May 31: 4-6pm PC Davis/Riverside room To apply, students must have \
  completed 90 units, at least 2 upper-division courses and have a minimum \
  of 2.5 UC GPA (2.7 GPA for lab internships unless a higher \
  Wednesday 8:00-1:00pm."""

