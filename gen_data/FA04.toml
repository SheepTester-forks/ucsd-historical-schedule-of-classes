[AIP]
name = "Academic Internship Program"

[AIP.courses.197]
title = "Academic Internship Program"
catalog = "/courses/AIP.html#aip197"
note = """Students must apply one quarter before they want to intern (2 \
  quarters for Washington D.C., London, and other out-of-town internships). \
  The Academic Internship Program begins accepting applications the 2nd week \
  of each quarter. Course includes orientation and wrap-up sessions. Students \
  will choose one of the following orientation sessions: Orientations for \
  Fall 2004 Internships: Week 2: Wednesday, October 6 10:00-11:00am in Warren \
  Conf Rm Wednesday, October 6 2:30-3:30pm in Warren Conf Rm Thursday, \
  October 7 10:00-11:00am in Warren Conf Rm Thursday, October 7 2:30-3:30pm in \
  Warren Conf Rm Students will choose one of the following wrap-up sessions: \
  Wrap-Up Workshops for Fall 2004 Internships Week 8: Tuesday, \
  November 16, 4:00-6:00pm in S.B./L.A. Rm Week 9: Monday, \
  November 22, 4:00-6:00pm in S.B./L.A. Rm To apply, students must have \
  completed 90 units, at least 2 upper-division courses and have a minimum \
  of 2.5 UC GPA (3.0 for law firms and medical labs). Applications are \
  available in the AIP Office which is located in the Literature Building, \
  second floor, room 3255. Walk-in hours are 8:00-12:00 and 1:00-4:00 Mondays, \
  Tuesdays, Thursdays, and Fridays and 8:00-1:00 Wednesdays."""

