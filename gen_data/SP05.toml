[AIP]
name = "Academic Internship Program"

[AIP.courses.197]
title = "Academic Internship Program"
catalog = "/courses/AIP.html#aip197"
note = """Students must apply one quarter before they want to intern (2 \
  quarters for Washington D.C., London, and other out-of-town internships). \
  The Academic Internship Program begins accepting applications the 2nd week \
  of each quarter. Course includes orientation and wrap-up sessions. Students \
  will choose one of the following orientation sessions: Orientations for \
  Spring 2005 Internships: Week 2: Monday, April 4 2:30- 3:30pm in Warren Conf \
  Rm Tuesday, April 5 10:00-11:00am in Warren Conf Rm Wednesday, \
  April 6 10:00-11:00am in Warren Conf Rm Thursday, April 7 2:30-3:30pm in \
  Warren Conf Rm Students will choose one of the following wrap-up sessions: \
  Wrap-Up Workshops for Spring 2005 Internships Week 8: Monday, \
  May 16 4:00-6:00pm in PC Gallery A Week 9: Tuesday, May 24 4:00-6:00pm in PC \
  Gallery A To apply, students must have completed 90 units, at least 2 upper-\
  division courses and have a minimum of 2.5 UC GPA (3.0 for law firms and \
  medical labs, 2.8 for all other labs unless a higher GPA is required by the \
  principal investigator). Applications are available in the AIP Office which \
  is located in the Literature Building, second floor, room 3255. Walk-in \
  hours are 8:00-12:00 and 1:00-4:00 Mondays, Tuesdays, Thursdays, and Fridays \
  and 8:00-1:00 Wednesdays."""

