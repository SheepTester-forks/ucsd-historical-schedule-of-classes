catalog = "/courses/DOC.html#doc2"
note = """This information applies to all three DOC 2 lectures (A00, B00 and \
  C00): Satisfaction of the Entry Level Writing Requirement is a mandatory \
  prerequisite of DOC 2. Students who are enrolled in ELWR 1 Fall Quarter may \
  not enroll in DOC 2 until their Academic History shows they have met the \
  prerequisite. DOC 2 discussion sections will meet twice a week, starting \
  Week 1 (either Tuesday, January 10, or Wednesday, January 11). Failure to \
  attend the first discussion section meeting may result in the student losing \
  his/her space in the course. Adding or switching DOC sections may be done \
  via WebReg as openings occur through Friday of Week 1. Students may not add \
  late or miss the first week of the quarter. Students who are still on \
  waitlists after Week 1 should plan to take DOC 2 next year."""

[DOC.courses.100D]
title = "Promises&Contradictions/USCult"
catalog = "/courses/DOC.html#doc100d"
note = """DOC 100D satisfies UCSD's Diversity, Equity, and Inclusion \
  requirement. Marshall College transfer students should verify their \
  eligibility for this course with Academic Advising. It is open to upper- \
  division students from the other five colleges. Waitlisted students will \
  only be allowed into the class if seats become available due to dropping \
  Week 1. Please email docinfo@ucsd.edu with your PID# if you have questions. \
  This course will provide a broad overview of the histories of multiple \
  communities and explore the struggle for social justice in the United \
  States. Topics include social movements, shifting ideas about \"race\" and \
  gender, the rise of corporate power, and the transformation of higher \
  education."""

