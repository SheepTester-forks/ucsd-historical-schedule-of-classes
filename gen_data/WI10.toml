[AIP]
name = "Academic Internship Program"

[AIP.courses.197]
title = "Academic Internship Program"
catalog = "/courses/AIP.html#aip197"
note = """To apply, students must have completed 90 units, at least 2 upper-\
  division courses and have a minimum of 2.5 UC GPA (unless higher GPA is \
  required for a specific field or industry). Applications are available in \
  the AIP office, which is located in the Literature Building, second floor, \
  room 210. Walk-in hours are Monday, Tuesday, Thursday, and Friday 8am \
  to 12pm and 1 - 4pm and on Wednesday 8am to 1pm. Students must apply one \
  quarter before they want to intern. The Academic Internship Program begins \
  accepting applications the 2nd week of each quarter. Course includes online \
  workshops and assignments as well as a research paper or research project."""

