[DOC]
name = "Dimensions of Culture"

[DOC.courses.3]
title = "Imagination"
catalog = "/courses/DOC.html#doc3"
note = """This information applies to all three DOC 3 lectures (A00,B00,C00): \
  Satisfaction of the Entry Level Writing Requirement is a mandatory \
  prerequisite of DOC 3. Students who are enrolled in SDCC 1 Winter Quarter \
  must wait until they have completed that course and met the ELWR prerequiste \
  to enroll in DOC 3. DOC 3 discussion sections will meet twice a week, \
  starting Week 1 (either Tuesday, March 31, or Wednesday April 1). Failure to \
  attend the first discussion section meeting may result in the student losing \
  his/ her space in the course. Adding and dropping DOC sections may be done \
  via WebReg through 4:00 PM on Friday, April 3. After that, students must get \
  DOC office approval to make any changes in their DOC enrollment (email \
  docinfo@ucsd.edu and include PID)."""

[DOC.courses.100D]
title = "Promises&Contradictions/USCult"
catalog = "/courses/DOC.html#doc100d"
note = """DOC 100D satisfies UCSD's Diversity, Equity, and Inclusion \
  requirement. It is open to Marshall College transfer students as well as all \
  upper-division students from the other five colleges. Each lecture of this \
  course is limited to 30 students. Waitlisted students will only be allowed \
  into the class if seats become available due to dropping Week 1. Please \
  email docinfo@ucsd.edu with your PID# if you have questions. This course \
  will provide a broad overview of the histories of multiple communities and \
  explore the struggle for social justice in the United States. Topics include \
  social movements, shifting ideas about \"race\" and gender, the rise of \
  corporate power, and the transformation of higher education."""

