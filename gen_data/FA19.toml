note = """DOC 1 lectures begin Friday, September 27. DOC 1 discussion sections \
  will meet for the first time on Wednesday, October 2, or Friday, October 4. (\
  There are no \"Week Zero\" DOC 1 discussion sections.) Attendance is \
  mandatory. Adding and dropping DOC sections may be done via WebReg through \
  Friday of Week One. Adding this class Week Two or later is not allowed. \
  Students may not be enrolled in DOC 1 concurrently with AWP 2A-2B (\
  Analytical Writing and Academic English)."""

[DOC.courses.100D]
title = "Promises&Contradictions/USCult"
catalog = "/courses/DOC.html#doc100d"
note = """DOC 100D satisfies UCSD's Diversity, Equity, and Inclusion \
  requirement. Marshall College transfer students should verify their \
  eligibility for this course with Academic Advising. It is open to upper- \
  division students from the other five colleges. Waitlisted students will \
  only be allowed into the class if seats become available due to dropping \
  Week 1. Please email docinfo@ucsd.edu with your PID# if you have questions. \
  This course will provide a broad overview of the histories of multiple \
  communities and explore the struggle for social justice in the United \
  States. Topics include social movements, shifting ideas about \"race\" and \
  gender, the rise of corporate power, and the transformation of higher \
  education."""

