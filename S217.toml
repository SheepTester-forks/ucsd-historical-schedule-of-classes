note = """Students may add and drop ELWR 1, ELWR 2A and ELWR 2B sections on \
  the online Schedule of Classes as enrollment limits allow. New students may \
  add a section only if they took the UC Analytical Writing Placement Exam and \
  did not pass: prerequisite checking is in place. The Division of Arts and \
  Humanities policy requires instructors to drop students who miss more \
  than 10% of class meeting time. In keeping with this policy, students who \
  miss the first two class meetings will not be allowed to add ELWR 1, ELWR 2A \
  or ELWR 2B. Students who enroll in any of the ELWR classes but then fail to \
  attend the first two meetings will be dropped. If you have not cleared an \
  ELWR waitlist by the first day of classes, it is unlikely you will clear at \
  all. Immediately find an open section of the appropriate class, enroll, and \
  attend the first class meeting. If you are having trouble finding an open \
  section that fits your schedule, visit the Basic Writing office (Literature \
  Building 227) for help."""

