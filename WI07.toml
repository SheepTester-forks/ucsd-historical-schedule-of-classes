[AIP]
name = "Academic Internship Program"

[AIP.courses.197]
title = "Academic Internship Program"
catalog = "/courses/AIP.html#aip197"
note = """Students must apply one quarter before they want to intern (2 \
  quarters for out-of-town internships.) The Academic Internship Program \
  begins accepting applications the 2nd week of each quarter. Course includes \
  Orientation, Mid-quarter check-in and Wrap-up sessions. Students will attend \
  one of the times for each session. Orientations for Winter 2007 Internships: \
  Week 2: Tuesday, Jan. 16: 10:00-11:00am in PC Davis/Riverside Wednesday, \
  Jan. 17: 10:00-11:00am in PC Davis/Riverside Thursday, Jan. 18: 2:30-3:30pm \
  in PC Davis/Riverside . Mid-quarter check-in session Winter 2007: Week 5: \
  Tuesday, Feb. 6: 10:00-11:00am in PC Davis/Riverside Wednesday, \
  Feb. 7: 10:00-11:00am in PC Davis/Riverside Wednesday, Feb. 7: 2:30-3:30pm \
  in PC Davis/Riverside Thursday, Feb . 8: 2:30-3:30 in PC Davis/Riverside . \
  Wrap-up Workshops for Winter 2007 Internships Week 8: Tuesday, \
  Feb . 27: 4:00-6:00pm in PC SB/LA Week 9: Monday, March 5: 4:00-6:00pm in PC \
  SB/LA To apply, students must have completed 90 units, at least 2 upper-\
  division courses and have a minimum of 2.5 UC GPA (2.7 GPA for lab \
  internships unless a higher Wednesday 8:00-1:00pm."""

