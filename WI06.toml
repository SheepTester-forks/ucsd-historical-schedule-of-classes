[AIP]
name = "Academic Internship Program"

[AIP.courses.197]
title = "Academic Internship Program"
catalog = "/courses/AIP.html#aip197"
note = """Students must apply one quarter before they want to intern (2 \
  quarters for summer lab internships, Washington D.C., London, and other out-\
  of-town internships). The Academic Internship Program begins accepting \
  applications the 2nd week of each quarter. Course includes orientation; mid-\
  quarter check-in session; and wrap-up sessions. Students will choose one of \
  the following orientation sessions: Orientations for Winter 06 Internships: \
  Week 2: Tuesday, January 17 11:00-12:00pm in AIP Conf Rm Wednesday, \
  January 18 10:00-11:00am in AIP Conf Rm Wednesday, January 18 2:30-3:30pm in \
  AIP Conf Rm Thursday, January 19 2:30-3:30pm in AIP Conf Rm Mid-quarter \
  check-in session Winter 2006: Week 5: Tuesday, February 7 11:00-12:00pm in \
  AIP Conf Rm Wednesday, February 8 10:00-11:00am in AIP Conf Rm Wednesday, \
  February 8 2:30-3:30pm in AIP Conf Rm Thursday, February 9 2:30-3:30 in AIP \
  Conf RM Students will choose one of the following wrap-up sessions: Wrap-up \
  Workshops for Winter 2006 Internships Week 8: Tuesday, \
  February 28 4:00-6:00pm in PC Gallery B Week 9: Monday, March 6 4:00-6:00pm \
  in PC Gallery B To apply, students must have completed 90 units, at least 2 \
  upper-division courses and have a minimum of 2.5 UC GPA (2.7 for labs unless \
  a higher GPA is required by the principal investigator). Applications are \
  available in the AIP Office which is located in the Literature Building, \
  second floor. Walk-in hours are 8:00-12:00 and 1:00-4:00 Mondays, Tuesdays, \
  Thursdays, and Fridays and 8:00-1:00 on Wednesdays."""

