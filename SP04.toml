  checking is in place. Do NOT wait list for SDCC 1 or SDCC 4 sections. The \
  Basic Writing program does NOT use wait lists. If one cannot be accommodated \
  by the open sections available on StudentLink, one may add or drop a SDCC 1 \
  or SDCC 4 section by appearing at the Basic Writing Office, Lit. 3232. San \
  Diego Community College District policy requires instructors to drop \
  students who miss more than 10% of class meeting time. In keeping with this \
  policy, students who miss the first two class meetings will not be allowed \
  to add SDCC 1 or SDCC 4. Students who enroll in SDCC 1 or SDCC 4 but then \
  fail to attend the first two meetings will be dropped."""

