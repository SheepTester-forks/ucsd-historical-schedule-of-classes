catalog = "/courses/VIS.html#vis60"
note = """Students enrolled in VIS 60 are responsible for a $28.50 materials \
  fee which will be assessed with registration fees. This fee is non-\
  refundable after Week 2. In addition, students are responsible for providing \
  their own camera. Recommended camera is a Digital SLR with full manual \
  control and RAW file capability. Minimum requirement is a digital camera \
  of 7 Mega Pixels, or higher, with manual exposure and focus controls. Cell \
  phone cameras are not acceptable. VIS 60 sections will not meet before the \
  first lecture."""

