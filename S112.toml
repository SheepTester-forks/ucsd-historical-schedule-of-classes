[DOC]
name = "Dimensions of Culture"

[DOC.courses.100D]
title = "Promises&Contradictions/USCult"
catalog = "/courses/DOC.html#doc100d"
note = """Juniors and Seniors from all six colleges may take this course. If \
  you get an error message when you try to enroll, please email docinfo@ucsd.\
  edu with your PID#. \"DOC 100D: Key Issues in U.S. Culture and History\" is \
  designed to provide a broad overview of key historical contradictions in the \
  history of the United States and to explore the origins of social \
  stratifications and the social movements that attempted to overcome them. \
  Students will acquire tools for analyzing the tensions that arose as the \
  nation developed. Central aspects of the course include slavery, women's \
  rights, and the rise of corporate power. By grounding lectures and \
  discussions in the historical development of collective identities, the \
  course introduces concepts related to the intersections of categoires such \
  as class, gender, religion, \"race,\" and sexuality. Students will learn to \
  analyze and discuss complex historical artifacts that range from theoretical \
  essays on racialization to autobiography to video and film./"""

