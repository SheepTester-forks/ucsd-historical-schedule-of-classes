  they took the UC Analytical Writing Placement Exam and did not pass: \
  prerequisite checking is in place. Instructors will drop students who miss \
  more than 10% of class meeting time. In keeping with this policy, students \
  who miss the first class meeting will not be allowed to add ELWR 1S. \
  Students who enroll in ELWR 1S, but then fail to attend the first meeting \
  will be dropped. If you have not cleared a ELWR 1S waitlist by the first day \
  of classes, it is unlikely you will clear at all. Immediately find an open \
  section of the appropriate class, enroll, and attend the first class \
  meeting. If you are having trouble finding an open section that fits your \
  schedule, visit the Basic Writing office (Literature Building 232) for \
  help."""

