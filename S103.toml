note = """Students who would like to do an Independent Study (SOCE 199) with a \
  particular professor, should come to the Sociology Department (SSB 401) to \
  pick up and file the necessary Special Studies application. Please see the \
  Undergraduate Coordinator, during her office hours. Students will be given a \
  Section ID number once the form has been approved and signed by the \
  Department Chair. To add the 199, take the approved Special Studies \
  application directly to the Registrar's Office during the first two weeks of \
  the quarter, AFTER the application has been signed by your instructor and \
  the Department Chair."""

