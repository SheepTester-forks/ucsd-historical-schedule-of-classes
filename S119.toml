  Videoconferencing capability (a computer equipped with a microphone and \
  webcam), a reliable internet connection, and a quiet, private location are \
  required for this course. In addition to two hours of synchronous (\
  scheduled) online discussion sections each week, students will participate \
  in asynchronous interactive activities such as message boards and blogs. \
  Please visit: http://sixth.ucsd.edu/cat/courses/cat-125/ for more \
  information."""

