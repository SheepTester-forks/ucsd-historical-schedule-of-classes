[VIS.courses.100]
title = "Introduction to Public Culture"
catalog = "/courses/VIS.html#vis100"
note = """A brief survey on the institutionalizations of Public Art and \
  subsequent reactionary development of community, environmental and political \
  practices. Anatomy of Public Space, its on-going privatization, including \
  its "wallifications" and "mallifications" through the concept of "defensible \
  space." Branding of global cities, through international events like \
  Olympics, World Cups, World Fairs and Art Biennales, and 'signature' \
  architectural monuments. Information visualizations of communication, \
  transportation and other forms of movements across territories, including \
  materials, products and populations. Examination of critical geography, such \
  as borders, territories and sovereignty."""

