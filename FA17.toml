  sign up for a tutorial section at http://sections.ucsd.edu/. The information \
  on the tutorial sections (schedules, instructions, etc.) will be e-mailed to \
  you from the Japanese Studies Program (japan@ucsd.edu). It also will be \
  available on TritonEd website after Monday, September 25, 2017. You are \
  required to attend the same tutorial sections on MWF. You do not need to \
  register for the tutorial sections listed under the lecture section in which \
  you enrolled. (Note: Some tutorial sections may be cancelled.) GPS students \
  who have prior experience in learning Japanese must directly contact your \
  GPS advisor."""

