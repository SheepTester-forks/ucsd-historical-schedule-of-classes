catalog = "/courses/SIO.html#sio123"
note = """Environmental systems biology is the study of the genomic basis for \
  patterns of microbial diversity and adaptation in relation to habitat. This \
  course introduces the microbial genome as a unit of study and surveys \
  introductory principles in microbial genomics and bioinformatics that \
  underlay a range of contemporary research in diverse marine habitats, such \
  as the deep sea and polar regions, as well as studies of biomedical \
  importance including the human microbiom. Prerequisite: BICD 100."""

